services:
  web: 
    build: 
      context: .
      dockerfile: ${DOCKER_FILE:-Dockerfile}
    ports: 
      - "8080:8080"
    volumes:
      - .:/app
      - sqlite_data:/app/data  # Persistent volume for SQLite
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - DATABASE_URL=sqlite:///app/data/db.sqlite3  # SQLite connection string
    depends_on:
      redis:
        condition: service_healthy
    # No need for db or migrate services

  redis:
    image: redis:7
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  sqlite_data:  # Named volume to persist database between restarts